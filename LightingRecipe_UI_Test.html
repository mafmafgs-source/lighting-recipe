<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Lighting Recipe UI Test</title>
<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif}
.wrap{max-width:430px;margin:auto;padding:10px}
.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px}
.top{display:flex;gap:8px}
.photo{flex:3;height:180px;background:#ddd;border-radius:10px;display:flex;align-items:center;justify-content:center}
.side{flex:1;display:flex;flex-direction:column;gap:8px}
.box,.exif1,.exif2{border:1px solid #ddd;border-radius:8px;padding:6px}
.exif1,.exif2{display:flex;font-size:12px}
.exif1 div,.exif2 div{flex:1}
#lighting{height:320px;border:1px solid #ddd;border-radius:10px;position:relative;background:#fafafa}
.library{display:flex;gap:6px;overflow:auto;margin-top:8px}
.item{border:1px solid #ccc;border-radius:8px;padding:8px;min-width:60px;text-align:center}
</style></head><body>
<div class='wrap'>
<div class='card'>
<div class='top'>
<div class='photo'>写真</div>
<div class='side'>
<div class='box'><b>📍ロケーション</b><br>非公開</div>
<div class='box'><b>📝メモ</b><br>窓光＋補助光</div>
</div>
</div>
<div class='exif1'><div>📷 SONY α7IV</div><div>🔍 SIGMA 85mm F1.4 Art</div></div>
<div class='exif2'><div>F1.8</div><div>1/160</div><div>ISO100</div><div>85mm</div><div>5200K</div></div>
</div>

<div class='card'>
<h3>ライティング図</h3>
<div id='lighting'>
<div style='position:absolute;left:50%;top:45%;transform:translate(-50%,-50%)'>👤</div>
<div style='position:absolute;left:50%;bottom:10px;transform:translateX(-50%)'>📷</div>
</div>
<div class='library'>
<div class='item'>⚡AD400</div>
<div class='item'>⚡AD200</div>
<div class='item'>⬡Octa</div>
<div class='item'>△Stand</div>
<div class='item'>💡Video</div>
</div>
</div>

<div class='card'>
<h3>機材詳細</h3>
AD400Pro + 120cm Octa + 1052BAC<br><br>
高さ<br><input type='range' min='0' max='100' value='50' style='width:100%'>
<br><br>出力
<select><option>1/32</option><option>1/16</option></select>
<textarea style='width:100%;height:80px;margin-top:10px'>顔の左を狙う</textarea>
</div>
</div></body></html>
