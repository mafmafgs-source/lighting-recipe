<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lighting Recipe v1.6</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
</head>
<body>
<div class="wrap">
<h2>Lighting Recipe v1.6</h2>

<input type="file" id="photoInput" accept="image/*">
<div id="photoBox">写真</div>

<div id="cameraInfo">カメラ名</div>
<div id="lensInfo">レンズ名</div>
<div id="exifInfo">EXIF</div>

<h3>ライティング図</h3>
<div id="canvas"></div>

<h3>機材ライブラリ</h3>
<button onclick="addGear('AD100')">AD100</button>
<button onclick="addGear('AD200')">AD200</button>
<button onclick="addGear('AD300')">AD300</button>
<button onclick="addGear('AD400')">AD400</button>
<button onclick="addGear('AD600')">AD600</button>

<h3>合体エリア</h3>
<div id="assembly"></div>
<button onclick="createLight()">Light①生成</button>

<br><br>
<button onclick="exportImage()">PNG出力</button>
</div>

<script src="app.js"></script>
</body>
</html>
