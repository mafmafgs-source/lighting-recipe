<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lighting Recipe v1.6.2</title>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:0;padding:10px}
.wrap{max-width:430px;margin:auto}
.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px}
.photoRow{display:flex;gap:8px}
.photo{flex:2;height:220px;border:2px dashed #bbb;border-radius:12px;background:#fafafa;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
.photo img{width:100%;height:100%;object-fit:contain}
.side{flex:1;display:flex;flex-direction:column;gap:8px}
.box{flex:1;border:1px solid #ddd;border-radius:8px;padding:8px}
.exif{font-size:12px;display:flex;justify-content:space-between;margin-top:4px}

.stage{
aspect-ratio:1/1;
border:1px solid #ccc;
border-radius:12px;
background:#fff;
position:relative;
overflow:hidden;
touch-action:none;
}

.subject{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:42px}
.cameraIcon{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);font-size:36px}

.lightCard{
position:absolute;
left:20px;
top:220px;
background:transparent;
font-size:11px;
z-index:10;
}

.beamWrap{
position:absolute;
width:120px;
height:120px;
cursor:move;
touch-action:none;
}

.beamWrap.selected{
outline:2px solid #0b57d0;
border-radius:50%;
}

.controls{
display:grid;
grid-template-columns:20% 80%;
gap:8px;
margin-top:8px;
}

.addBtn{
border:none;
border-radius:10px;
background:#0b57d0;
color:#fff;
font-size:32px;
min-height:64px;
}

.editBox{
background:#0b57d0;
color:#fff;
border-radius:10px;
padding:6px 8px;
}

.editBox input{width:100%}

svg{overflow:visible;pointer-events:none}
</style>
</head>
<body>

<div class="wrap">

<div class="card">

<div class="photoRow">

<label class="photo" id="photoArea">
<input hidden id="photoInput" type="file" accept="image/*">
写真選択
</label>

<div class="side">
<div class="box" contenteditable="true">📍 Location</div>
<div class="box" contenteditable="true">📝 Memo</div>
</div>

</div>

<div class="exif">
<div>Camera: <span id="cam">未読込</span></div>
<div>Lens: <span id="lens">未読込</span></div>
</div>

<div class="exif">
<div id="fv">F--</div>
<div id="ss">1/---</div>
<div id="iso">ISO---</div>
</div>

</div>

<div class="card">

<div id="stage" class="stage">

<div class="subject">👤</div>
<div class="cameraIcon">📷</div>

<div class="lightCard">
120cm Octa<br>
AD100Pro<br>
Nano Stand<br>
⬡<br>▣<br>│<br>╱╲
</div>

</div>

<div class="controls">

<button class="addBtn" id="addBtn">💡</button>

<div class="editBox">
配光 <span id="beamVal">100%</span>
<input id="beamSlider" type="range" min="5" max="100" value="100">

回転 <span id="rotVal">0°</span>
<input id="rotSlider" type="range" min="0" max="360" value="0">
</div>

</div>

</div>

</div>

<script>
const stage=document.getElementById('stage');
const beamSlider=document.getElementById('beamSlider');
const rotSlider=document.getElementById('rotSlider');
const beamVal=document.getElementById('beamVal');
const rotVal=document.getElementById('rotVal');

let beams=[];
let selected=null;

/* EXIF修正版 */

photoArea.onclick=()=>photoInput.click();

photoInput.onchange=function(e){

 const file=e.target.files[0];
 if(!file) return;

 const reader=new FileReader();

 reader.onload=function(ev){

   const img=new Image();

   img.onload=function(){

     photoArea.innerHTML='';
     photoArea.appendChild(img);

     EXIF.getData(img,function(){

       cam.textContent =
         EXIF.getTag(this,"Model") ||
         EXIF.getTag(this,"Make") ||
         "取得失敗";

       lens.textContent =
         EXIF.getTag(this,"LensModel") ||
         "-";

       const f=EXIF.getTag(this,"FNumber");
       if(f) fv.textContent='F'+f;

       const exp=EXIF.getTag(this,"ExposureTime");
       if(exp){
         ss.textContent=
         exp<1 ?
         '1/'+Math.round(1/exp)
         : exp+'s';
       }

       const isoVal=EXIF.getTag(this,"ISOSpeedRatings");
       if(isoVal){
         iso.textContent='ISO'+isoVal;
       }

     });

   };

   img.src=ev.target.result;

 };

 reader.readAsDataURL(file);
};

function clearSelection(){
 beams.forEach(b=>b.el.classList.remove('selected'));
 selected=null;
}

stage.addEventListener('click',(e)=>{
 if(e.target===stage){
   clearSelection();
 }
});

function drag(el){
 el.onpointerdown=(e)=>{
  e.preventDefault();

  const sx=e.clientX;
  const sy=e.clientY;

  const ox=el.offsetLeft;
  const oy=el.offsetTop;

  const mv=(ev)=>{
   el.style.left=(ox+ev.clientX-sx)+'px';
   el.style.top=(oy+ev.clientY-sy)+'px';
  };

  const up=()=>{
   document.removeEventListener('pointermove',mv);
   document.removeEventListener('pointerup',up);
  };

  document.addEventListener('pointermove',mv,{passive:false});
  document.addEventListener('pointerup',up);
 };
}

function renderBeam(obj){

 const p=obj.beam;
 const rot=obj.rot;

 const circle=obj.el.querySelector('.circle');
 const arc=obj.el.querySelector('.arc');

 if(p>=95){
   circle.style.display='block';
   arc.style.display='none';
   return;
 }

 circle.style.display='none';
 arc.style.display='block';

 const angle=Math.max(5,p*3.6);

 const start=(-angle/2+rot-90)*Math.PI/180;
 const end=(angle/2+rot-90)*Math.PI/180;

 const x1=60+50*Math.cos(start);
 const y1=60+50*Math.sin(start);

 const x2=60+50*Math.cos(end);
 const y2=60+50*Math.sin(end);

 const large=angle>180?1:0;

 arc.setAttribute(
 'd',
 `M60 60 L ${x1} ${y1} A 50 50 0 ${large} 1 ${x2} ${y2} Z`
 );
}

function selectBeam(obj){

 beams.forEach(b=>b.el.classList.remove('selected'));

 obj.el.classList.add('selected');
 selected=obj;

 beamSlider.value=obj.beam;
 rotSlider.value=obj.rot;

 beamVal.textContent=obj.beam+'%';
 rotVal.textContent=obj.rot+'°';
}

addBtn.onclick=()=>{

 const wrap=document.createElement('div');

 wrap.className='beamWrap';
 wrap.style.left='140px';
 wrap.style.top='120px';

 wrap.innerHTML=`
 <svg width="120" height="120">
 <circle class="circle" cx="60" cy="60" r="50" fill="rgba(255,220,0,.25)"></circle>
 <path class="arc" fill="rgba(255,220,0,.45)"></path>
 </svg>`;

 const obj={
  el:wrap,
  beam:100,
  rot:0
 };

 beams.push(obj);

 wrap.onclick=(e)=>{
  e.stopPropagation();
  selectBeam(obj);
 };

 stage.appendChild(wrap);

 drag(wrap);
 renderBeam(obj);
 selectBeam(obj);
};

beamSlider.oninput=()=>{
 if(!selected) return;

 selected.beam=parseInt(beamSlider.value);

 beamVal.textContent=selected.beam+'%';

 renderBeam(selected);
};

rotSlider.oninput=()=>{
 if(!selected) return;

 selected.rot=parseInt(rotSlider.value);

 rotVal.textContent=selected.rot+'°';

 renderBeam(selected);
};
</script>

</body>
</html>
