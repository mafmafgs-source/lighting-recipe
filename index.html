<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Lighting Recipe v1.7</title>
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#f0f0f2;color:#1a1a1a;-webkit-text-size-adjust:100%}
.wrap{max-width:430px;margin:auto;padding:10px}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:14px;font-weight:700;color:#555;margin-bottom:10px;letter-spacing:.04em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
/* 写真 */
.photo-box{width:100%;height:200px;background:#1a1a1a;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:10px;position:relative}
.photo-box img{width:100%;height:100%;object-fit:contain;display:none}
.photo-box img.loaded{display:block}
.photo-hint{color:#666;font-size:12px;text-align:center;position:absolute}
/* ロケーション・メモ */
.meta-row{display:flex;gap:8px;align-items:stretch}
.info-box{border:1px solid #e8e8e8;border-radius:8px;padding:8px;font-size:11px;color:#888;background:#fafafa}
.info-box label{display:block;margin-bottom:3px;font-weight:600;white-space:nowrap}
.info-box input,.info-box textarea{width:100%;border:none;background:transparent;font-size:12px;color:#1a1a1a;resize:none;outline:none;font-family:inherit}
.info-loc{flex:1;min-width:0}
.info-memo{flex:1.4;min-width:0;display:flex;flex-direction:column}
.info-memo textarea{flex:1;min-height:56px}
/* ロケーション */
.loc-wrap{position:relative}
.loc-input-row{display:flex;align-items:center;gap:3px}
.loc-input-row input{flex:1;min-width:0}
.loc-clear{background:none;border:none;font-size:13px;color:#ccc;cursor:pointer;padding:0 2px;flex-shrink:0;display:none}
.loc-clear.visible{display:block}
.loc-hint{font-size:10px;color:#f57c00;background:#fff8e8;border-radius:5px;padding:3px 5px;margin-top:4px;display:none;line-height:1.3}
.loc-hint.show{display:block}
/* サジェスト：absoluteに変更（Safariのfixed座標ズレ対策） */
.loc-suggestions-wrap{position:relative}
.loc-suggestions{
  position:absolute;left:0;right:0;top:calc(100% + 4px);
  background:#fff;border:1px solid #e0e0e0;border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,.14);z-index:200;overflow:hidden;display:none
}
.loc-suggestions.open{display:block}
.sug-list{display:flex;overflow-x:auto}
.loc-sug-item{flex:0 0 auto;min-width:130px;padding:8px 10px;cursor:pointer;border-right:1px solid #f0f0f0}
.loc-sug-item:last-child{border-right:none}
.loc-sug-item:active{background:#f0f7ff}
.sug-pin{font-size:12px;margin-bottom:2px;display:block}
.sug-name{font-size:12px;font-weight:600;color:#1a1a1a;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-addr{font-size:10px;color:#999;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.loc-powered{text-align:right;padding:3px 8px;font-size:9px;color:#bbb;border-top:1px solid #f0f0f0;background:#fafafa}
/* EXIF */
.exif-row{display:flex;margin-top:8px;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden}
.exif-row .cell{flex:1;padding:6px 4px;font-size:11px;text-align:center;border-right:1px solid #e8e8e8}
.exif-row .cell:last-child{border-right:none}
.exif-row .cell b{display:block;font-size:10px;color:#999;font-weight:500;margin-bottom:2px}
.exif-names{display:flex;margin-top:4px;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden}
.exif-names .cell{flex:1;padding:6px 4px;font-size:11px;text-align:center}
/* キャンバス */
.lighting-wrap{position:relative}
#canvas{width:100%;aspect-ratio:1/1;border:1px solid #e0e0e0;border-radius:12px;background:#fafafa;position:relative;overflow:hidden;touch-action:none}
.subject{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-size:28px;pointer-events:none;user-select:none}
.camera-icon{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);font-size:22px;pointer-events:none;user-select:none}
.height-legend{position:absolute;right:8px;top:8px;bottom:8px;width:16px;border-radius:8px;background:linear-gradient(to bottom,hsl(0,80%,55%),hsl(45,80%,55%),hsl(90,70%,45%),hsl(180,70%,45%),hsl(210,80%,55%));opacity:.7}
.legend-label{position:absolute;right:28px;font-size:9px;color:#999}
.legend-top{top:8px}.legend-btm{bottom:8px}
#lightSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
/* ライトノード */
.light-node{position:absolute;width:48px;height:48px;border-radius:50%;border:6px solid #ccc;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;touch-action:none;font-size:10px;font-weight:700;transition:border-color .15s;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.light-node.selected{box-shadow:0 0 0 3px rgba(255,152,0,.5)}
/* パネル */
#panel{margin-top:10px}
.panel-card{border:1px solid #e8e8e8;border-radius:10px;padding:10px;background:#fafafa}
.panel-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#333}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.slider-row label{font-size:12px;color:#555;min-width:36px}
.slider-row input[type=range]{flex:1;accent-color:#1a73e8;-webkit-appearance:none;height:4px;border-radius:2px}
.slider-val{font-size:11px;color:#1a73e8;font-weight:700;min-width:36px;text-align:right}
.items-list{margin-top:8px}
.item-tag{display:inline-block;background:#e8f0fe;color:#1a56c4;border-radius:6px;padding:3px 8px;font-size:11px;margin:2px}
/* 光パーツパネル */
.light-panel-card{border:1px solid #1a73e8;border-radius:10px;padding:10px;background:#e8f0fe;margin-bottom:10px}
.light-panel-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#1a56c4}
/* 背景トグル */
.bg-toggle input[type=checkbox]{display:none}
.bg-toggle-btn{display:inline-block;padding:5px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;color:#555;background:#f5f5f5;cursor:pointer;transition:background .15s,color .15s;user-select:none}
.bg-toggle input:checked+.bg-toggle-btn{background:#1a73e8;color:#fff;border-color:#1a73e8}
/* Builderボタン */
.btn-builder{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:#1a73e8;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;-webkit-tap-highlight-color:transparent}
.btn-builder:active{background:#1558b0}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <!-- Safari対応：labelでfile inputをラップ -->
    <label for="fileInput" style="display:block;cursor:pointer">
      <div class="photo-box">
        <img id="photoImg" alt="">
        <div class="photo-hint" id="photoHint">📷 タップして写真を追加</div>
      </div>
    </label>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="meta-row">
      <div class="info-box info-loc">
        <label id="locLabel">📍 ロケーション</label>
        <!-- サジェストをloc-wrapの中に（absolute配置） -->
        <div class="loc-wrap loc-suggestions-wrap">
          <div class="loc-input-row">
            <input id="locInput" placeholder="場所を検索" autocomplete="off" autocorrect="off" autocapitalize="off">
            <button class="loc-clear" id="locClear" type="button">✕</button>
          </div>
          <div class="loc-hint" id="locHint">APIキー設定後<br>候補が表示されます</div>
          <div class="loc-suggestions" id="locSuggestions">
            <div class="sug-list" id="sugList"></div>
            <div class="loc-powered">Powered by Google</div>
          </div>
        </div>
      </div>
      <div class="info-box info-memo">
        <label id="memoLabel">📝 メモ</label>
        <textarea id="memoInput" placeholder="撮影メモ"></textarea>
      </div>
    </div>
    <div class="exif-names">
      <div class="cell"><b id="exCameraLabel">カメラ</b><span id="exCamera">–</span></div>
      <div class="cell"><b id="exLensLabel">レンズ</b><span id="exLens">–</span></div>
      <div class="cell"><b id="exDateLabel">撮影日</b><span id="exDate">–</span></div>
    </div>
    <div class="exif-row">
      <div class="cell"><b id="exFLabel">F値</b><span id="exF">–</span></div>
      <div class="cell"><b id="exSSLabel">SS</b><span id="exSS">–</span></div>
      <div class="cell"><b id="exISOLabel">ISO</b><span id="exISO">–</span></div>
      <div class="cell"><b id="exFLLabel">焦点距離</b><span id="exFL">–</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span id="lightingTitle">ライティング図</span>
      <div style="display:flex;align-items:center;gap:6px">
        <label class="bg-toggle" title="背景">
          <input type="checkbox" id="bgToggle" onchange="toggleBg()">
          <span class="bg-toggle-btn" id="bgToggleText">背景</span>
        </label>
        <input type="color" id="bgColor" value="#ffffff"
          style="width:28px;height:28px;border:1px solid #ddd;border-radius:6px;cursor:pointer;padding:2px;background:none;display:none"
          oninput="saveSession();renderBg()">
        <a class="btn-builder" href="builder.html" style="width:auto;padding:6px 14px;font-size:13px"><span id="editBtnText">＋ 機材編集</span></a>
      </div>
    </div>
    <div class="lighting-wrap">
      <div id="canvas">
        <svg id="lightSvg" xmlns="http://www.w3.org/2000/svg"><g id="bgGroup"></g></svg>
        <div class="subject">👤</div>
        <div class="camera-icon">📷</div>
        <div class="height-legend"></div>
        <span class="legend-label legend-top" id="legendTop">高い</span>
        <span class="legend-label legend-btm" id="legendBtm">低い</span>
      </div>
    </div>
    <div id="panel"></div>
  </div>

  <div class="card" id="beamPanelCard">
    <div class="light-panel-card">
      <div class="light-panel-title" id="beamTitle">💡 光パーツ（選択中のライト）</div>
      <div class="slider-row">
        <label id="beamLabel">配光</label>
        <input type="range" id="beamSlider" min="5" max="100" value="40" step="1">
        <span class="slider-val" id="beamVal">40%</span>
      </div>
      <div class="slider-row">
        <label id="angleLabel">角度</label>
        <input type="range" id="angleSlider" min="0" max="360" value="270" step="1">
        <span class="slider-val" id="angleVal">270°</span>
      </div>
      <div style="font-size:11px;color:#888;margin-top:4px" id="beamHint">ライトを選択すると光パーツが表示されます</div>
    </div>
    <a class="btn-builder" href="builder.html"><span id="builderBtnText">機材を設定する (Builder)</span></a>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  i18n
// ══════════════════════════════════════
const I18N={
  ja:{photoHint:'📷 タップして写真を追加',locLabel:'📍 ロケーション',locPlaceholder:'場所を検索',memoLabel:'📝 メモ',memoPlaceholder:'撮影メモ',exCamera:'カメラ',exLens:'レンズ',exDate:'撮影日',exF:'F値',exSS:'SS',exISO:'ISO',exFL:'焦点距離',lightingTitle:'ライティング図',bgBtn:'背景',editBtn:'＋ 機材編集',legendHigh:'高い',legendLow:'低い',beamTitle:'💡 光パーツ（選択中のライト）',beamLabel:'配光',angleLabel:'角度',beamHint:'ライトを選択すると光パーツが表示されます',builderBtn:'機材を設定する (Builder)',heightLabel:'高さ',outputLabel:'出力',noItems:'機材なし（Builderで追加）',panelTitle:(l)=>`${l} の設定`,locHint:'APIキー設定後<br>候補が表示されます'},
  en:{photoHint:'📷 Tap to add photo',locLabel:'📍 Location',locPlaceholder:'Search location',memoLabel:'📝 Memo',memoPlaceholder:'Shooting notes',exCamera:'Camera',exLens:'Lens',exDate:'Date',exF:'F',exSS:'SS',exISO:'ISO',exFL:'FL',lightingTitle:'Lighting Diagram',bgBtn:'BG',editBtn:'＋ Edit Gear',legendHigh:'High',legendLow:'Low',beamTitle:'💡 Light Beam',beamLabel:'Spread',angleLabel:'Angle',beamHint:'Select a light to edit beam',builderBtn:'Set up gear (Builder)',heightLabel:'Height',outputLabel:'Output',noItems:'No gear (add in Builder)',panelTitle:(l)=>`${l} Settings`,locHint:'Suggestions appear<br>after API key is set'},
  zh:{photoHint:'📷 点击添加照片',locLabel:'📍 拍摄地点',locPlaceholder:'搜索地点',memoLabel:'📝 备注',memoPlaceholder:'拍摄备注',exCamera:'相机',exLens:'镜头',exDate:'日期',exF:'光圈',exSS:'快门',exISO:'ISO',exFL:'焦距',lightingTitle:'布光图',bgBtn:'背景',editBtn:'＋ 编辑器材',legendHigh:'高',legendLow:'低',beamTitle:'💡 光束',beamLabel:'光束角',angleLabel:'角度',beamHint:'选择灯光以编辑光束',builderBtn:'设置器材 (Builder)',heightLabel:'高度',outputLabel:'输出',noItems:'无器材（在Builder中添加）',panelTitle:(l)=>`${l} 设置`,locHint:'设置API密钥后<br>将显示候选地点'},
  ko:{photoHint:'📷 탭하여 사진 추가',locLabel:'📍 촬영 장소',locPlaceholder:'장소 검색',memoLabel:'📝 메모',memoPlaceholder:'촬영 메모',exCamera:'카메라',exLens:'렌즈',exDate:'날짜',exF:'조리개',exSS:'셔터',exISO:'ISO',exFL:'초점거리',lightingTitle:'조명 다이어그램',bgBtn:'배경',editBtn:'＋ 장비 편집',legendHigh:'높음',legendLow:'낮음',beamTitle:'💡 광원',beamLabel:'광각',angleLabel:'각도',beamHint:'조명을 선택하면 광원이 표시됩니다',builderBtn:'장비 설정 (Builder)',heightLabel:'높이',outputLabel:'출력',noItems:'장비 없음 (Builder에서 추가)',panelTitle:(l)=>`${l} 설정`,locHint:'API 키 설정 후<br>후보가 표시됩니다'},
};
function detectLang(){const n=(navigator.language||'en').toLowerCase();if(n.startsWith('ja'))return 'ja';if(n.startsWith('zh'))return 'zh';if(n.startsWith('ko'))return 'ko';return 'en';}
const LANG=detectLang(), T=I18N[LANG];
document.documentElement.lang=LANG;

function applyI18n(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const sh=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v;};
  s('photoHint',T.photoHint);
  s('locLabel',T.locLabel);
  document.getElementById('locInput').placeholder=T.locPlaceholder;
  sh('locHint',T.locHint);
  s('memoLabel',T.memoLabel);
  document.getElementById('memoInput').placeholder=T.memoPlaceholder;
  s('lightingTitle',T.lightingTitle);
  s('bgToggleText',T.bgBtn);
  s('editBtnText',T.editBtn);
  s('legendTop',T.legendHigh);
  s('legendBtm',T.legendLow);
  s('beamTitle',T.beamTitle);
  s('beamLabel',T.beamLabel);
  s('angleLabel',T.angleLabel);
  s('beamHint',T.beamHint);
  s('builderBtnText',T.builderBtn);
  s('exCameraLabel',T.exCamera);s('exLensLabel',T.exLens);s('exDateLabel',T.exDate);
  s('exFLabel',T.exF);s('exSSLabel',T.exSS);s('exISOLabel',T.exISO);s('exFLLabel',T.exFL);
}

// ══════════════════════════════════════
//  Google Places APIキー
// ══════════════════════════════════════
const GOOGLE_PLACES_API_KEY='';
if(!GOOGLE_PLACES_API_KEY)document.getElementById('locHint').classList.add('show');

// ── ロケーション ──────────────────────
const locInput=document.getElementById('locInput');
const locClear=document.getElementById('locClear');
const locSuggestions=document.getElementById('locSuggestions');
const sugList=document.getElementById('sugList');
const DUMMY=[{name:'ハコアム東京',addr:'東京都渋谷区'},{name:'スタジオBMB新宿',addr:'東京都新宿区'},{name:'Photo Studio HAL',addr:'東京都港区'}];
let debounceTimer=null;

locInput.addEventListener('input',()=>{
  const q=locInput.value.trim();
  locClear.classList.toggle('visible',q.length>0);
  clearTimeout(debounceTimer);
  saveSession();
  if(!q){closeSuggestions();return;}
  debounceTimer=setTimeout(()=>fetchSuggestions(q),300);
});
// Safari対応：touchstartでもサジェスト起動
locInput.addEventListener('focus',()=>{
  if(locInput.value.trim())fetchSuggestions(locInput.value.trim());
});
locInput.addEventListener('touchstart',()=>{
  setTimeout(()=>{if(locInput.value.trim())fetchSuggestions(locInput.value.trim());},100);
},{passive:true});
locClear.addEventListener('click',()=>{locInput.value='';locClear.classList.remove('visible');closeSuggestions();saveSession();});

async function fetchSuggestions(q){
  const items=DUMMY.filter(s=>s.name.includes(q)||s.addr.includes(q));
  showSuggestions(items.length?items:DUMMY);
}
function showSuggestions(items){
  if(!items.length){closeSuggestions();return;}
  sugList.innerHTML=items.map(s=>`<div class="loc-sug-item" data-name="${s.name}"><span class="sug-pin">📍</span><span class="sug-name">${s.name}</span><span class="sug-addr">${s.addr}</span></div>`).join('');
  sugList.querySelectorAll('.loc-sug-item').forEach(el=>{
    const sel=()=>{locInput.value=el.dataset.name;locClear.classList.add('visible');closeSuggestions();saveSession();};
    el.addEventListener('mousedown',e=>{e.preventDefault();sel();});
    el.addEventListener('touchstart',()=>setTimeout(sel,50),{passive:true});
  });
  locSuggestions.classList.add('open');
}
function closeSuggestions(){locSuggestions.classList.remove('open');}
document.getElementById('memoInput').addEventListener('input',()=>saveSession());
document.addEventListener('touchstart',e=>{
  if(!locInput.contains(e.target)&&!locSuggestions.contains(e.target))closeSuggestions();
},{passive:true});
document.addEventListener('click',e=>{
  if(!locInput.contains(e.target)&&!locSuggestions.contains(e.target))closeSuggestions();
});

// ── EXIF ──────────────────────────────
document.getElementById('fileInput').addEventListener('change',async function(e){
  const file=e.target.files[0];
  if(!file)return;
  // 写真表示 + localStorageに保存（Base64）
  const reader=new FileReader();
  reader.onload=ev=>{
    const dataUrl=ev.target.result;
    const img=document.getElementById('photoImg');
    img.onload=()=>{img.classList.add('loaded');};
    img.src=dataUrl;
    document.getElementById('photoHint').style.display='none';
    savePhotoToSession(dataUrl);
  };
  reader.readAsDataURL(file);
  // EXIF
  try{
    const ex=await exifr.parse(file,{tiff:true,exif:true,gps:false});
    if(!ex)return;
    document.getElementById('exCamera').textContent=ex.Make&&ex.Model?ex.Make+' '+ex.Model:(ex.Model||'–');
    document.getElementById('exLens').textContent=ex.LensModel||'–';
    document.getElementById('exF').textContent=ex.FNumber?'F'+ex.FNumber:'–';
    document.getElementById('exSS').textContent=ex.ExposureTime?(ex.ExposureTime<1?'1/'+Math.round(1/ex.ExposureTime)+'s':ex.ExposureTime+'s'):'–';
    document.getElementById('exISO').textContent=ex.ISO?'ISO'+ex.ISO:'–';
    document.getElementById('exFL').textContent=ex.FocalLength?ex.FocalLength+'mm':'–';
    const dt=ex.DateTimeOriginal||ex.DateTime||ex.CreateDate;
    if(dt){
      const d=dt instanceof Date?dt:new Date(String(dt).replace(':','/',1).replace(':','/',1));
      if(!isNaN(d.getTime()))document.getElementById('exDate').textContent=d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    }
  }catch(err){console.warn('EXIF error:',err);}
});

// ══════════════════════════════════════
//  高さ→色
// ══════════════════════════════════════
const HEIGHT_MIN=0,HEIGHT_MAX=300,HEIGHT_DEFAULT=150;
function heightToColor(h){
  const stops=[[0,[41,98,255]],[75,[0,188,255]],[150,[0,200,83]],[225,[255,196,0]],[300,[255,50,30]]];
  for(let i=0;i<stops.length-1;i++){
    const[h0,c0]=stops[i],[h1,c1]=stops[i+1];
    if(h>=h0&&h<=h1){const t=(h-h0)/(h1-h0);return`rgb(${Math.round(c0[0]+(c1[0]-c0[0])*t)},${Math.round(c0[1]+(c1[1]-c0[1])*t)},${Math.round(c0[2]+(c1[2]-c0[2])*t)})`;}
  }
  return'#ccc';
}

// ══════════════════════════════════════
//  localStorage
// ══════════════════════════════════════
const LS_KEY='lightingRecipeLights';
let lights=[],selected=null;
let bgOn=false;

function loadLights(){
  try{
    const s=JSON.parse(localStorage.getItem(LS_KEY));
    if(Array.isArray(s)&&s.length===5)return s;
  }catch(e){}
  return Array.from({length:5},(_,i)=>({id:['A','B','C','D','E'][i],items:[],height:HEIGHT_DEFAULT,x:20+i*15,y:30,beam:40,angle:270,output:null}));
}

// ══════════════════════════════════════
//  セッション保存（写真・ロケ・メモ・背景）
// ══════════════════════════════════════
const SS_KEY='lr_session';

function saveSession(){
  try{
    const s={
      loc:document.getElementById('locInput').value,
      memo:document.getElementById('memoInput').value,
      bgOn:bgOn,
      bgColor:document.getElementById('bgColor').value,
    };
    localStorage.setItem(SS_KEY,JSON.stringify(s));
  }catch(e){}
}

// ── IndexedDB（写真保存用・最大数百MB）──
const IDB_NAME='lr_db', IDB_STORE='photos', IDB_VER=1;

function openIDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(IDB_NAME,IDB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}

async function savePhotoToSession(dataUrl){
  try{
    const db=await openIDB();
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(dataUrl,'current_photo');
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=rej;});
    db.close();
  }catch(e){console.warn('photo IDB save failed:',e);}
}

async function loadPhotoFromIDB(){
  try{
    const db=await openIDB();
    const tx=db.transaction(IDB_STORE,'readonly');
    const result=await new Promise((res,rej)=>{
      const req=tx.objectStore(IDB_STORE).get('current_photo');
      req.onsuccess=e=>res(e.target.result);
      req.onerror=rej;
    });
    db.close();
    return result||null;
  }catch(e){return null;}
}

function restoreSession(){
  // ロケ・メモ・背景（localStorage）
  try{
    const raw=localStorage.getItem(SS_KEY);
    if(raw){
      const s=JSON.parse(raw);
      if(s.loc) document.getElementById('locInput').value=s.loc;
      if(s.memo) document.getElementById('memoInput').value=s.memo;
      if(s.bgColor) document.getElementById('bgColor').value=s.bgColor;
      if(s.bgOn){
        bgOn=true;
        document.getElementById('bgToggle').checked=true;
        document.getElementById('bgColor').style.display='inline-block';
      }
    }
  }catch(e){}
  // 写真（IndexedDB・非同期）
  loadPhotoFromIDB().then(dataUrl=>{
    if(!dataUrl)return;
    const img=document.getElementById('photoImg');
    img.src=dataUrl;
    img.classList.add('loaded');
    document.getElementById('photoHint').style.display='none';
  });
}

function saveLights(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(lights));}catch(e){}
}

// 機材名から画像を全localStorage DBで検索
function findItemImg(name){
  try{
    const customs=JSON.parse(localStorage.getItem('lr_customCats')||'[]');
    const allItems=customs.flatMap(c=>c.items||[]);
    const matched=allItems.find(it=>
      typeof it==='object'&&
      ((it.maker?it.maker+' '+it.model:it.model).trim()===name||it.model===name)
    );
    return matched&&matched.img?matched.img:null;
  }catch(e){return null;}
}

// ストロボ判定
function isStrobe(items){return items.some(n=>/AD\d|strobe/i.test(n));}
const STROBE_STEPS=['1/256','1/128','1/64','1/32','1/16','1/8','1/4','1/2','1/1'];
function strobeLabel(v){return STROBE_STEPS[Math.round(v)]||'1/1';}
function outputLabel(l){
  if(!l.items||!l.items.length)return'';
  const v=l.output!=null?l.output:null;
  if(isStrobe(l.items))return v!=null?strobeLabel(v):'1/1';
  return(v!=null?Math.round(v):100)+'%';
}

// ══════════════════════════════════════
//  背景
// ══════════════════════════════════════
function toggleBg(){
  bgOn=document.getElementById('bgToggle').checked;
  document.getElementById('bgColor').style.display=bgOn?'inline-block':'none';
  saveSession();
  renderBg();
}

function renderBg(){
  const canvas=document.getElementById('canvas');
  const W=canvas.getBoundingClientRect().width||canvas.offsetWidth||300;
  const H=W;
  const svg=document.getElementById('lightSvg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const g=document.getElementById('bgGroup');
  g.innerHTML='';
  if(!bgOn)return;

  const bgColorVal=document.getElementById('bgColor').value||'#ffffff';
  const cx=W*0.5,cy=H*0.42,bgW=W*0.55,bgTop=H*0.04;
  const curveDepth=H*0.10,curveY=cy+H*0.08;
  const left=cx-bgW/2,right=cx+bgW/2;

  const pathD=[
    `M${left},${bgTop}`,`L${right},${bgTop}`,`L${right},${curveY}`,
    `Q${right},${curveY+curveDepth} ${right-curveDepth},${curveY+curveDepth}`,
    `L${left+curveDepth},${curveY+curveDepth}`,
    `Q${left},${curveY+curveDepth} ${left},${curveY}`,
    `L${left},${bgTop}`,'Z'
  ].join(' ');

  // Safari対応：url(#id)の代わりにsolidColorを使う
  const hex=bgColorVal.replace('#','');
  const r=parseInt(hex.slice(0,2),16),gg=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  const lighter=`rgb(${Math.min(255,r+40)},${Math.min(255,gg+40)},${Math.min(255,b+40)})`;
  const darker=`rgb(${Math.max(0,r-40)},${Math.max(0,gg-40)},${Math.max(0,b-40)})`;

  const ns='http://www.w3.org/2000/svg';
  const defs=document.createElementNS(ns,'defs');
  const grad=document.createElementNS(ns,'radialGradient');
  const gid='bgGrad_'+Date.now(); // 毎回ユニークIDでSafariキャッシュ問題回避
  grad.setAttribute('id',gid);
  grad.setAttribute('cx','50%');grad.setAttribute('cy','40%');
  grad.setAttribute('r','60%');grad.setAttribute('gradientUnits','objectBoundingBox');
  const s0=document.createElementNS(ns,'stop');
  s0.setAttribute('offset','0%');s0.setAttribute('stop-color',lighter);s0.setAttribute('stop-opacity','1');
  const s1=document.createElementNS(ns,'stop');
  s1.setAttribute('offset','100%');s1.setAttribute('stop-color',darker);s1.setAttribute('stop-opacity','1');
  grad.appendChild(s0);grad.appendChild(s1);
  defs.appendChild(grad);
  g.appendChild(defs);

  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',pathD);
  path.setAttribute('fill',`url(#${gid})`);
  path.setAttribute('stroke','rgba(0,0,0,0.12)');
  path.setAttribute('stroke-width','1');
  g.appendChild(path);

  const bar=document.createElementNS(ns,'rect');
  bar.setAttribute('x',left);bar.setAttribute('y',bgTop-4);
  bar.setAttribute('width',bgW);bar.setAttribute('height',8);bar.setAttribute('rx',4);
  bar.setAttribute('fill','rgba(0,0,0,0.15)');
  g.appendChild(bar);
}

// ══════════════════════════════════════
//  光パーツ
// ══════════════════════════════════════
function renderBeams(){
  const svg=document.getElementById('lightSvg');
  const canvas=document.getElementById('canvas');
  const W=canvas.getBoundingClientRect().width||canvas.offsetWidth||300;
  const H=W;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const ns='http://www.w3.org/2000/svg';
  let defs=document.getElementById('beamDefs');
  if(!defs){defs=document.createElementNS(ns,'defs');defs.id='beamDefs';svg.appendChild(defs);}
  defs.innerHTML='';
  svg.querySelectorAll('.beam-group').forEach(el=>el.remove());

  lights.forEach((l,i)=>{
    if(!l.items||!l.items.length)return;
    const cx=(l.x??20)/100*W,cy=(l.y??30)/100*H;
    const beam=l.beam??40,angleDeg=l.angle??270;
    const spreadDeg=beam/100*360;
    const R=Math.min(W,H)*0.22;
    const gid='beam_'+i+'_'+Date.now();
    const grad=document.createElementNS(ns,'radialGradient');
    grad.setAttribute('id',gid);grad.setAttribute('gradientUnits','userSpaceOnUse');
    grad.setAttribute('cx',cx);grad.setAttribute('cy',cy);grad.setAttribute('r',R);
    const s0=document.createElementNS(ns,'stop');
    s0.setAttribute('offset','0%');s0.setAttribute('stop-color','#ffe566');s0.setAttribute('stop-opacity','1.0');
    const s1=document.createElementNS(ns,'stop');
    s1.setAttribute('offset','55%');s1.setAttribute('stop-color','#ffcc00');s1.setAttribute('stop-opacity','0.55');
    const s2=document.createElementNS(ns,'stop');
    s2.setAttribute('offset','100%');s2.setAttribute('stop-color','#ffaa00');s2.setAttribute('stop-opacity','0.1');
    grad.appendChild(s0);grad.appendChild(s1);grad.appendChild(s2);
    defs.appendChild(grad);

    const grp=document.createElementNS(ns,'g');
    grp.setAttribute('class','beam-group');
    if(spreadDeg>=359.9){
      const circle=document.createElementNS(ns,'circle');
      circle.setAttribute('cx',cx);circle.setAttribute('cy',cy);circle.setAttribute('r',R);
      circle.setAttribute('fill',`url(#${gid})`);
      grp.appendChild(circle);
    }else{
      const half=spreadDeg/2;
      const a1=(angleDeg-half)*Math.PI/180,a2=(angleDeg+half)*Math.PI/180;
      const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
      const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const lg=spreadDeg>180?1:0;
      const path=document.createElementNS(ns,'path');
      path.setAttribute('d',`M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2} Z`);
      path.setAttribute('fill',`url(#${gid})`);
      grp.appendChild(path);
    }
    svg.appendChild(grp);
  });
}

// ══════════════════════════════════════
//  ライトノード
// ══════════════════════════════════════
function renderCanvas(){
  const canvas=document.getElementById('canvas');
  canvas.querySelectorAll('.light-node').forEach(n=>n.remove());
  lights.forEach((l,i)=>{
    if(!l.items||!l.items.length)return;
    const node=document.createElement('div');
    node.className='light-node'+(i===selected?' selected':'');
    node.dataset.idx=i;
    const h=l.height??HEIGHT_DEFAULT;
    node.style.borderColor=heightToColor(h);
    node.style.left=(l.x??20)+'%';
    node.style.top=(l.y??30)+'%';
    node.style.transform='translate(-50%,-50%)';
    // 機材の中に画像があれば背景に表示
    const nodeImg = l.items.reduce((found,name)=>found||findItemImg(name), null);
    if(nodeImg){
      node.style.backgroundImage='url('+nodeImg+')';
      node.style.backgroundSize='cover';
      node.style.backgroundPosition='center';
      node.style.background='url('+nodeImg+') center/cover no-repeat';
    }
    node.innerHTML=
      '<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;background:'+
      (nodeImg?'rgba(0,0,0,0.35)':'transparent')+'">' +
      '<span style="font-size:12px;font-weight:800;line-height:1;color:'+(nodeImg?'#fff':'inherit')+'">${['A','B','C','D','E'][i]}</span>'+
      '<span style="font-size:8px;line-height:1;margin-top:1px;color:'+(nodeImg?'rgba(255,255,255,0.9)':'#555')+'">${outputLabel(l)}</span>'+
      '</div>';
    node.addEventListener('click',e=>{e.stopPropagation();selected=(selected===i)?null:i;renderAll();renderPanel();});
    makeDraggable(node,canvas,i);
    canvas.appendChild(node);
  });
  renderBg();
  renderBeams();
}

function renderAll(){renderCanvas();}

function makeDraggable(node,canvas,idx){
  let sx,sy,sl,st;
  const mv=(ex,ey)=>{
    const rect=canvas.getBoundingClientRect();
    lights[idx].x=Math.max(0,Math.min(100,sl+(ex-sx)/rect.width*100));
    lights[idx].y=Math.max(0,Math.min(100,st+(ey-sy)/rect.height*100));
    node.style.left=lights[idx].x+'%';node.style.top=lights[idx].y+'%';
    renderBg();renderBeams();
  };
  node.addEventListener('mousedown',e=>{
    e.preventDefault();sx=e.clientX;sy=e.clientY;sl=lights[idx].x??20;st=lights[idx].y??30;
    const up=()=>{document.removeEventListener('mousemove',mvM);document.removeEventListener('mouseup',up);};
    const mvM=e=>mv(e.clientX,e.clientY);
    document.addEventListener('mousemove',mvM);document.addEventListener('mouseup',up);
  });
  node.addEventListener('touchstart',e=>{
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;sl=lights[idx].x??20;st=lights[idx].y??30;
    const mvT=e=>{const t=e.touches[0];mv(t.clientX,t.clientY);};
    const up=()=>{document.removeEventListener('touchmove',mvT);document.removeEventListener('touchend',up);};
    document.addEventListener('touchmove',mvT,{passive:true});document.addEventListener('touchend',up);
  },{passive:true});
}

document.getElementById('canvas').addEventListener('click',()=>{selected=null;renderCanvas();renderPanel();});

// ══════════════════════════════════════
//  パネル
// ══════════════════════════════════════
function renderPanel(){
  const panel=document.getElementById('panel');
  if(selected===null){panel.innerHTML='';updateBeamPanel();return;}
  const l=lights[selected],h=l.height??HEIGHT_DEFAULT,color=heightToColor(h);
  const strobe=isStrobe(l.items);
  const outVal=l.output!=null?l.output:(strobe?8:100);
  panel.innerHTML=`
    <div class="panel-card" style="border-color:${color}">
      <div class="panel-title">${T.panelTitle(['A','B','C','D','E'][selected])}</div>
      <div class="slider-row">
        <label>${T.heightLabel}</label>
        <input type="range" id="hSlider" min="${HEIGHT_MIN}" max="${HEIGHT_MAX}" value="${h}" step="5"
          style="background:linear-gradient(to right,rgb(41,98,255) 0%,rgb(0,188,255) 25%,rgb(0,200,83) 50%,rgb(255,196,0) 75%,rgb(255,50,30) 100%)">
      </div>
      <div class="slider-row">
        <label>${T.outputLabel}</label>
        <input type="range" id="outSlider" min="0" max="${strobe?8:100}" value="${outVal}" step="1">
        <span class="slider-val" id="outVal">${strobe?strobeLabel(outVal):outVal+'%'}</span>
      </div>
      <div class="items-list">
        ${l.items.length?l.items.map(n=>`<span class="item-tag">${n}</span>`).join(''):`<span style="font-size:12px;color:#aaa">${T.noItems}</span>`}
      </div>
    </div>`;
  document.getElementById('hSlider').addEventListener('input',e=>{
    lights[selected].height=Number(e.target.value);
    panel.querySelector('.panel-card').style.borderColor=heightToColor(lights[selected].height);
    const nd=document.querySelector(`.light-node[data-idx="${selected}"]`);
    if(nd)nd.style.borderColor=heightToColor(lights[selected].height);
    saveLights();
  });
  document.getElementById('outSlider').addEventListener('input',e=>{
    const val=Number(e.target.value);lights[selected].output=val;
    const strb=isStrobe(lights[selected].items);
    document.getElementById('outVal').textContent=strb?strobeLabel(val):val+'%';
    const nd=document.querySelector(`.light-node[data-idx="${selected}"]`);
    if(nd){const sp=nd.querySelectorAll('span');if(sp[1])sp[1].textContent=strb?strobeLabel(val):val+'%';}
    saveLights();
  });
  updateBeamPanel();
}

function updateBeamPanel(){
  const bs=document.getElementById('beamSlider'),as=document.getElementById('angleSlider');
  const bv=document.getElementById('beamVal'),av=document.getElementById('angleVal');
  const hint=document.getElementById('beamHint');
  if(selected===null){
    bs.disabled=true;as.disabled=true;bs.style.opacity='.4';as.style.opacity='.4';
    if(hint)hint.style.display='block';return;
  }
  const l=lights[selected];
  bs.disabled=false;as.disabled=false;bs.style.opacity='1';as.style.opacity='1';
  if(hint)hint.style.display='none';
  bs.value=l.beam??40;as.value=l.angle??270;
  bv.textContent=(l.beam??40)+'%';av.textContent=(l.angle??270)+'°';
  bs.oninput=e=>{lights[selected].beam=Number(e.target.value);bv.textContent=e.target.value+'%';renderBg();renderBeams();saveLights();};
  as.oninput=e=>{lights[selected].angle=Number(e.target.value);av.textContent=e.target.value+'°';renderBg();renderBeams();saveLights();};
}

window.addEventListener('resize',()=>{renderBg();renderBeams();});

// ページ表示時にlocalStorageを再読み込み（builderから戻った時対応）
window.addEventListener('pageshow',()=>{
  lights=loadLights();
  restoreSession();
  renderCanvas();
  renderPanel();
});

applyI18n();
lights=loadLights();
restoreSession();
// DOMレイアウト確定後に描画
requestAnimationFrame(()=>{renderCanvas();renderPanel();});
</script>
