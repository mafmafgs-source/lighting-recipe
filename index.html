<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>Lighting Recipe PWA</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:0;padding:10px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px}
.top{display:flex;gap:10px}
.photo{flex:2;height:220px;background:#ddd;border-radius:10px;display:flex;align-items:center;justify-content:center}
.side{flex:1}
.exif{display:flex;justify-content:space-around;font-size:12px;margin-top:8px}
#canvas{height:320px;border:1px solid #ccc;border-radius:10px;position:relative;background:#fafafa}
.rack{display:flex;gap:8px;overflow:auto;margin-top:8px}
.tool{padding:8px;border:1px solid #aaa;border-radius:8px;background:white}
</style>
</head>
<body>
<div class="card">
<div class="top">
<div class="photo">完成写真</div>
<div class="side">
<b>📍ロケーション</b><br>非公開<br><br>
<b>📝メモ</b><br>撮影メモ
</div>
</div>
<div class="exif">
<span>α7IV</span><span>85mm</span><span>F1.8</span><span>1/160</span><span>ISO100</span>
</div>
</div>

<div class="card">
<h3>ライティング図</h3>
<div id="canvas">
<div style="position:absolute;left:50%;top:40%;transform:translate(-50%,-50%)">👤</div>
<div style="position:absolute;left:50%;bottom:10px;transform:translateX(-50%)">📷</div>
</div>
<div class="rack">
<button class="tool" onclick="addNode('⚡')">⚡</button>
<button class="tool" onclick="addNode('💡')">💡</button>
<button class="tool" onclick="addNode('⬡')">⬡</button>
<button class="tool" onclick="addNode('▭')">▭</button>
<button class="tool" onclick="addNode('△')">△</button>
</div>
</div>

<script>
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('./sw.js');
}
const canvas=document.getElementById('canvas');
function addNode(icon){
 const d=document.createElement('div');
 d.textContent=icon;
 d.style.position='absolute';
 d.style.left='20px';
 d.style.top='20px';
 d.style.width='48px';
 d.style.height='48px';
 d.style.border='2px solid #333';
 d.style.borderRadius='50%';
 d.style.display='flex';
 d.style.alignItems='center';
 d.style.justifyContent='center';
 d.style.background='white';
 d.style.touchAction='none';
 canvas.appendChild(d);

 let sx,sy,ox,oy;
 d.onpointerdown=(e)=>{
  sx=e.clientX; sy=e.clientY;
  ox=parseInt(d.style.left); oy=parseInt(d.style.top);
  const move=(ev)=>{
   d.style.left=(ox+ev.clientX-sx)+'px';
   d.style.top=(oy+ev.clientY-sy)+'px';
  };
  const up=()=>{
   document.removeEventListener('pointermove',move);
   document.removeEventListener('pointerup',up);
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
 };
}
</script>
</body>
</html>
