<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lighting Recipe – Builder v1.3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;font-family:'Helvetica Neue',Arial,sans-serif;background:#0f0f0f;color:#e8e8e8}
.wrap{max-width:430px;margin:auto;padding:10px}

/* ── カード ── */
.card{background:#1a1a1a;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.5);border:1px solid #2e2e2e}
.card h3{font-size:14px;font-weight:700;color:#888;margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase}

/* ── カテゴリグリッド ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

/* 通常タイル */
.tile{border:1px solid #2e2e2e;border-radius:10px;padding:10px 6px;text-align:center;background:#141414;cursor:pointer;font-size:12px;color:#e8e8e8;transition:background .15s,border-color .15s}
.tile:active,.tile.active-cat{background:#2a2218;border-color:#c8a96e;color:#c8a96e}
.tile .icon{font-size:20px;display:block;margin-bottom:4px}
.tile .icon-img{width:48px;height:48px;object-fit:contain;display:block;margin:0 auto 4px;border-radius:6px}
/* サブカテゴリ展開パネル */
.subcat-panel{grid-column:1/-1;background:#111;border-radius:10px;padding:8px;margin-top:-4px;border:1px solid #2e2e2e}
.subcat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tile-sub{border:1px solid #2e2e2e;border-radius:8px;padding:8px 4px;text-align:center;background:#1a1a1a;cursor:pointer;font-size:11px;color:#e8e8e8;transition:background .15s}
.tile-sub:active,.tile-sub.active-cat{background:#2a2218;border-color:#c8a96e;color:#c8a96e}
.tile-sub .icon-img{width:40px;height:40px;object-fit:contain;display:block;margin:0 auto 3px;border-radius:4px}

/* 追加ボタンタイル */
.tile-add{border:1.5px dashed #c8a96e;color:#c8a96e;background:#1a1a0a}

/* 新規（未設定）カスタムタイル */
.tile-new{border:1.5px dashed #333;color:#555;background:#141414;position:relative}
.tile-new .icon{font-size:20px;display:block;margin-bottom:4px}

/* カテゴリヘッダー */
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-header h3{margin-bottom:0}
.cat-actions{display:flex;gap:6px}
.btn-cat-edit,.btn-cat-del{background:none;border:1px solid #333;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-cat-edit{color:#c8a96e;border-color:#c8a96e}
.btn-cat-edit:active{background:#2a2218}
.btn-cat-del{color:#888;border-color:#444}
.btn-cat-del:active{color:#c0392b;border-color:#c0392b}

/* ── 機材リスト ── */
.item{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid #222;cursor:pointer;transition:background .1s}
.item:last-child{border-bottom:none}
.item:active{background:#202020}
.thumb{width:36px;height:36px;border-radius:8px;background:#252525;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.item-name{font-size:14px;flex:1;color:#e8e8e8}
.item-sub{font-size:11px;color:#666;display:block}

/* 機材追加行 */
.item-add{background:#1a1a0a}
.item-add .thumb{background:#252218;color:#c8a96e}
.item-add .item-name{color:#c8a96e;font-weight:600}

/* スライド表示 */
.items-scroll{overflow-x:auto;display:flex;gap:0;flex-direction:column}
.show-more{text-align:center;padding:8px;font-size:12px;color:#c8a96e;cursor:pointer;border-top:1px solid #222}

/* ── ライトカード列 ── */
.lightRow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.lightCard{width:110px;flex-shrink:0;overflow:hidden;border:2px solid #2e2e2e;border-radius:12px;padding:8px;background:#141414;cursor:pointer;transition:border-color .15s}
.lightCard.active{border-color:#c8a96e;background:#1e1a10}
.lc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.lc-label{font-weight:700;font-size:13px;color:#e8e8e8}
.btn-clear{background:#c0392b;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;line-height:1}
.preview{font-size:24px;min-height:150px;display:flex;align-items:flex-end;justify-content:center;gap:3px;margin-bottom:6px;padding:4px 2px;overflow:hidden}
.preview-base-col{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0}
.preview-base-col img{display:block}
.preview-mod-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;flex-shrink:0}
.tag{display:block;font-size:10px;color:#888;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── ゴミ箱ボタン ── */
.item-del{background:none;border:none;font-size:17px;color:#444;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;margin-left:auto}
.item-del:active{color:#c0392b}
.thumb-img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.item-amz{background:none;border:1px solid #c8a96e;color:#c8a96e;border-radius:6px;font-size:9px;font-weight:700;padding:3px 5px;cursor:pointer;flex-shrink:0;line-height:1.2;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:2px}
.item-amz:active{background:#2a2218}

/* 追加ダイアログ（中央） */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-40%);background:#1e1e1e;color:#e8e8e8;border:1px solid #c8a96e;border-radius:14px;padding:18px 28px;font-size:14px;font-weight:600;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:0;transition:opacity .2s,transform .2s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translate(-50%,-50%)}
.btn-save{width:100%;padding:14px;border:none;border-radius:12px;background:#c8a96e;color:#0f0f0f;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.02em}
.btn-save:active{background:#b8956a}

/* ── オーバーレイ ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:20px}
.dlg{background:#1e1e1e;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.6);border:1px solid #333}
.dlg-title{font-size:16px;font-weight:700;margin-bottom:14px;color:#e8e8e8}
.dlg-body{margin-bottom:16px}
.dlg-field{margin-bottom:12px}
.dlg-field label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:600}
.dlg-field input{width:100%;padding:10px;border:1px solid #333;border-radius:8px;font-size:14px;outline:none;background:#141414;color:#e8e8e8}
.dlg-field input:focus{border-color:#c8a96e}
.dlg-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:12px;border:1px solid #333;border-radius:10px;background:#252525;font-size:14px;cursor:pointer;color:#aaa}
.btn-ok{flex:1;padding:12px;border:none;border-radius:10px;background:#c8a96e;color:#0f0f0f;font-size:14px;font-weight:700;cursor:pointer}

/* アイコンピッカー */
.icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.icon-opt{font-size:22px;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:border-color .1s}
.icon-opt.selected{border-color:#c8a96e;background:#2a2218}
/* タブバー */
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#111;border-top:1px solid #2e2e2e;z-index:500;max-width:100%}
.tab-bar a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 env(safe-area-inset-bottom,6px);text-decoration:none;font-size:10px;color:#666;gap:2px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.tab-bar a.active{color:#c8a96e}
.tab-bar a .tab-icon{font-size:18px;line-height:1}
.tab-spacer{height:70px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 機材倉庫 -->
  <div class="card">
    <h3 id="warehouseTitle">機材倉庫</h3>
    <div class="grid" id="catGrid"></div>
  </div>

  <!-- 機材リスト -->
  <div class="card" id="itemCard" style="display:none">
    <div class="cat-header">
      <h3 id="catTitle"></h3>
      <div class="cat-actions" id="catActions"></div>
    </div>
    <div id="itemList"></div>
  </div>

  <!-- Light Builder -->
  <div class="card">
    <h3 id="builderTitle">Light Builder</h3>
    <div class="lightRow" id="lightRow"></div>
  </div>

  <!-- 保存 -->
  <div class="card">
    <button class="btn-save" onclick="saveAndExit()" id="saveBtn">保存して戻る</button>
  </div>

</div>

<!-- オーバーレイ -->
<div id="overlay">
  <div class="dlg">
    <div class="dlg-title" id="dlgTitle"></div>
    <div class="dlg-body" id="dlgBody"></div>
    <div class="dlg-btns">
      <button class="btn-cancel" onclick="closeOverlay()" id="dlgCancel">キャンセル</button>
      <button class="btn-ok" id="dlgOk">OK</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  i18n：ブラウザ言語自動検出
// ══════════════════════════════════════
const I18N_DATA = {
  ja:{
    cats:{strobe:'ストロボ',video:'ビデオライト',video_stick:'スティック型',modifier:'モディファイア',softbox:'ソフトボックス',umbrella:'アンブレラ',beauty_dish:'ビューティーディッシュ',snoot:'スヌート',stand:'ライトスタンド',boom:'ブームアーム',reflector:'レフ板',flag:'Flag Frame'},
    warehouseTitle:'機材倉庫', catPrompt:'カテゴリを選んでください',
    builderTitle:'Light Builder', saveBtn:'保存して戻る',

    warehouseTitle:'장비 창고', catPrompt:'카테고리를 선택하세요',
    builderTitle:'라이트 빌더', saveBtn:'저장 후 돌아가기',
    addCatTile:'카테고리 추가', tapToSet:'탭하여 설정',
    addItemRow:'장비 추가', empty:'비어 있음',
    dlgCatTitle:'카테고리 설정', dlgCatNameLabel:'카테고리 이름', dlgCatNamePh:'예: 필터',
    dlgItemTitle:'장비 추가', dlgMakerLabel:'브랜드 (생략 가능)', dlgMakerPh:'예: Godox',
    dlgModelLabel:'모델명', dlgModelPh:'예: AD200Pro',
    dlgIconLabel:'아이콘 (이모지)',
    cancel:'취소', ok:'확인', outputLabel:'출력',
    alertCatName:'카테고리 이름을 입력하세요.', alertModel:'모델명을 입력하세요.',
    showMore:(n)=>`${n}개 더 보기`,
    deleteConfirm:(name)=>`「${name}」을 삭제하시겠습니까？`,
  },
};
function detectLang(){
  const nav=(navigator.language||'en').toLowerCase();
  if(nav.startsWith('ja'))return 'ja';
  if(nav.startsWith('zh'))return 'zh';
  if(nav.startsWith('ko'))return 'ko';
  return 'en';
}
const LANG=detectLang();
const T=I18N_DATA[LANG];
document.documentElement.lang=LANG;

// ══════════════════════════════════════════════
//  定数
// ══════════════════════════════════════════════
// Amazon アソシエイトタグ
const AMAZON_TAG = 'hiroyukinak01-22';
function amazonUrl(query){
  const q=encodeURIComponent(query);
  return `https://www.amazon.co.jp/s?k=${q}&tag=${AMAZON_TAG}`;
}

const ICONS_LIST = ['⚡','💡','⬡','△','┐','◻','🎯','🔦','🌟','🎬','🖼️','🔧','💎','🎨','📐','🧲','🔭','🎞️','💼','🗂️'];
const VISIBLE_COUNT = 5; // 最初に表示する件数

// ══════════════════════════════════════════════
//  デフォルトデータ
// ══════════════════════════════════════════════
const DEFAULT_CATS = [
  { id:'strobe',    icon:'⚡', imgPath:'icons/strobe.png',    get label(){ return T.cats.strobe; } },
  { id:'video',     icon:'💡', imgPath:'icons/video.png',     get label(){ return T.cats.video; },
    subs:[
      { id:'video',       icon:'💡', imgPath:'icons/video.png',       get label(){ return T.cats.video; } },
      { id:'video_stick', icon:'💡', imgPath:'icons/video_stick.png', get label(){ return T.cats.video_stick; } },
    ]
  },
  { id:'modifier',  icon:'⬡',  imgPath:'icons/softbox.png',  get label(){ return T.cats.modifier; },
    subs:[
      { id:'softbox',      icon:'⬡', imgPath:'icons/softbox.png',      get label(){ return T.cats.softbox; } },
      { id:'umbrella',     icon:'⬡', imgPath:'icons/umbrella.png',     get label(){ return T.cats.umbrella; } },
      { id:'beauty_dish',  icon:'⬡', imgPath:'icons/beauty_dish.png',  get label(){ return T.cats.beauty_dish; } },
      { id:'snoot',        icon:'⬡', imgPath:'icons/snoot.png',        get label(){ return T.cats.snoot; } },
    ]
  },
  { id:'stand',     icon:'△',  imgPath:'icons/stand.png',    get label(){ return T.cats.stand; } },
  { id:'boom',      icon:'┐',  imgPath:'icons/boom_stand.png', get label(){ return T.cats.boom; } },
  { id:'reflector', icon:'◻',  imgPath:'icons/reflector.png',get label(){ return T.cats.reflector; } },
  { id:'flag',      icon:'▬',  imgPath:'icons/flag.png',     get label(){ return T.cats.flag; } },
];

// デフォルト機材：{ maker, model } 形式
const DEFAULT_DB = {
  strobe:    [
    {maker:'Godox', model:'AD100Pro'},{maker:'Godox', model:'AD200Pro'},
    {maker:'Godox', model:'AD300Pro'},{maker:'Godox', model:'AD400Pro'},
    {maker:'Godox', model:'AD600Pro'},
  ],
  video:     [
    {maker:'Godox', model:'Forza300'},{maker:'Godox', model:'Forza500'},
    {maker:'Aputure', model:'300D'},{maker:'Aputure', model:'600D'},
  ],
  video_stick:[
    {maker:'Godox', model:'TL60'},{maker:'Godox', model:'TL120'},
    {maker:'Aputure', model:'MT Pro'},{maker:'Nanlite', model:'PavoTube II 15X'},
  ],
  softbox:   [
    {maker:'', model:'120cm Octa'},{maker:'', model:'90cm Octa'},
    {maker:'', model:'60cm Octa'},{maker:'', model:'Softbox 60x90'},
  ],
  umbrella:  [
    {maker:'', model:'White Umbrella 85cm'},{maker:'', model:'Silver Umbrella 85cm'},
    {maker:'', model:'Shoot-through Umbrella'},
  ],
  beauty_dish:[
    {maker:'', model:'Beauty Dish 55cm'},{maker:'', model:'Beauty Dish 70cm'},
  ],
  snoot:     [
    {maker:'', model:'Snoot'},{maker:'', model:'Grid Snoot'},
  ],
  stand:     [
    {maker:'Godox', model:'1052BAC'},{maker:'Godox', model:'Nano Stand'},
    {maker:'', model:'C-Stand'},{maker:'', model:'Air-cushioned Stand'},
  ],
  boom:      [{maker:'', model:'Boom Arm'},{maker:'', model:'Mini Boom'}],
  reflector: [
    {maker:'', model:'白レフ'},{maker:'', model:'黒レフ'},
    {maker:'', model:'シルバーレフ'},{maker:'', model:'トランスルーセント'},
  ],
  flag:      [
    {maker:'', model:'Flag Frame S'},{maker:'', model:'Flag Frame M'},
    {maker:'', model:'Flag Frame L'},
  ],
};

// デフォルトDB各カテゴリの初期件数（追加分との区別用）
const ORIGINAL_DB_COUNTS = {};
Object.keys(DEFAULT_DB).forEach(k => { ORIGINAL_DB_COUNTS[k] = DEFAULT_DB[k].length; });
// ══════════════════════════════════════════════
let customCats  = loadCustomCats();   // [{id, icon, label, items:[{maker,model}]}]
let pendingCats = loadPendingCats();  // グリッドに表示されているが未設定のダミー枠 [{id}]
let currentLight = 0;
let lights = loadLights();
let activeCatId = null;

// ══════════════════════════════════════════════
//  永続化
// ══════════════════════════════════════════════
function loadCustomCats() {
  try { return JSON.parse(localStorage.getItem('lr_customCats') || '[]'); } catch(e){ return []; }
}
function loadPendingCats() {
  try { return JSON.parse(localStorage.getItem('lr_pendingCats') || '[]'); } catch(e){ return []; }
}
function loadLights() {
  try {
    const s = JSON.parse(localStorage.getItem('lightingRecipeLights'));
    if (Array.isArray(s) && s.length === 5) return s;
  } catch(e){}
  return Array.from({length:5}, (_,i) => ({id:['A','B','C','D','E'][i], items:[], height:150, x:50, y:50, output:null}));
}
function saveCustomCats()  {
  // 画像データを除いた軽量版を保存、画像はIDBに別保存
  try{
    const slim=customCats.map(c=>({
      ...c,
      items:(c.items||[]).map(it=>{
        if(typeof it==='object'&&it.img){
          const {img,...rest}=it;
          return rest; // img除外
        }
        return it;
      })
    }));
    localStorage.setItem('lr_customCats', JSON.stringify(slim));
  }catch(e){ console.warn('saveCustomCats error:',e); }
}
function savePendingCats() { localStorage.setItem('lr_pendingCats', JSON.stringify(pendingCats)); }

// デフォルトカテゴリへの追加機材を保存
function saveDefaultAdditions(){
  try{
    const additions={};
    Object.keys(DEFAULT_DB).forEach(catId=>{
      const origCount=ORIGINAL_DB_COUNTS[catId]||0;
      const added=DEFAULT_DB[catId].slice(origCount);
      if(added.length) additions[catId]=added.map(it=>{
        if(typeof it==='object'&&it.img){const{img,...rest}=it;return rest;}
        return it;
      });
    });
    localStorage.setItem('lr_defaultAdditions',JSON.stringify(additions));
  }catch(e){}
}
function loadDefaultAdditions(){
  try{
    const additions=JSON.parse(localStorage.getItem('lr_defaultAdditions')||'{}');
    Object.keys(additions).forEach(catId=>{
      if(DEFAULT_DB[catId]) DEFAULT_DB[catId].push(...additions[catId]);
    });
  }catch(e){}
}

// 機材画像をIndexedDBに保存・取得
const IMG_IDB_NAME='lr_item_imgs', IMG_IDB_STORE='imgs', IMG_IDB_VER=1;
function openImgIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IMG_IDB_NAME,IMG_IDB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(IMG_IDB_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function saveItemImg(key, dataUrl){
  try{
    const db=await openImgIDB();
    const tx=db.transaction(IMG_IDB_STORE,'readwrite');
    tx.objectStore(IMG_IDB_STORE).put(dataUrl,key);
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=rej;});
    db.close();
  }catch(e){console.warn('saveItemImg error:',e);}
}
async function loadAllItemImgs(){
  try{
    const db=await openImgIDB();
    const tx=db.transaction(IMG_IDB_STORE,'readonly');
    const keys=await new Promise((res,rej)=>{
      const r=tx.objectStore(IMG_IDB_STORE).getAllKeys();
      r.onsuccess=e=>res(e.target.result);r.onerror=rej;
    });
    const result={};
    for(const key of keys){
      const tx2=db.transaction(IMG_IDB_STORE,'readonly');
      result[key]=await new Promise((res,rej)=>{
        const r=tx2.objectStore(IMG_IDB_STORE).get(key);
        r.onsuccess=e=>res(e.target.result);r.onerror=rej;
      });
    }
    db.close();
    return result;
  }catch(e){return {};}
}

// メインカテゴリ一覧（サブカテゴリ持ちは親のみ）
function allCats()  { return [...DEFAULT_CATS, ...customCats]; }

// id でカテゴリ検索（サブカテゴリも含めて探す）
function getCat(id) {
  for(const c of allCats()){
    if(c.id===id) return c;
    if(c.subs){ const s=c.subs.find(s=>s.id===id); if(s) return s; }
  }
  return null;
}

function getItems(id) {
  if (DEFAULT_DB[id]) return DEFAULT_DB[id];
  const c = customCats.find(c => c.id === id);
  return c ? c.items : [];
}

// 表示名: "メーカー 型番" or "型番"
function displayName(item) {
  if (typeof item === 'string') return item;
  return item.maker ? `${item.maker} ${item.model}` : item.model;
}

// 機材名から画像データを検索（全DB横断）
function findItemImg(name) {
  const allItems = [
    ...Object.values(DEFAULT_DB).flat(),
    ...customCats.flatMap(c => c.items || [])
  ];
  const matched = allItems.find(it =>
    typeof it === 'object' &&
    ((it.maker ? it.maker + ' ' + it.model : it.model).trim() === name || it.model === name)
  );
  return matched && matched.img ? matched.img : null;
}

function guessIcon(name) {
  if (/AD|Forza|Aputure/i.test(name))  return '⚡';
  if (/TL\d|PavoTube|MT Pro/i.test(name)) return '💡';
  if (/Octa|Dish|Umbrella|Soft|Snoot|Grid/i.test(name)) return '⬡';
  if (/BAC|Stand|C-Stand/i.test(name)) return '△';
  if (/Boom/i.test(name))  return '┐';
  if (/レフ|Trans|Reflector/i.test(name)) return '◻';
  if (/Flag/i.test(name)) return '▬';
  return '📦';
}

// 機材名からカテゴリのimgPathを逆引き
function getCatImgByItemName(name) {
  for(const [catId, items] of Object.entries(DEFAULT_DB)){
    if(items.some(it => displayName(it) === name || (typeof it==='object' && it.model === name))){
      const cat = getCat(catId);
      return cat && cat.imgPath ? cat.imgPath : null;
    }
  }
  for(const c of customCats){
    if((c.items||[]).some(it => displayName(it) === name)){
      return c.imgPath || null;
    }
  }
  return null;
}

// 展開中の親カテゴリID
let expandedCatId = null;

function iconHtml(cat, cls='icon-img') {
  if(cat.imgPath){
    return `<img class="${cls}" src="${cat.imgPath}" alt="${cat.label}" onerror="this.style.display='none';this.nextSibling&&(this.nextSibling.style.display='block')"><span class="icon" style="display:none">${cat.icon}</span>`;
  }
  return `<span class="icon">${cat.icon}</span>`;
}

function renderCats() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';

  allCats().forEach(cat => {
    const hasSubs = cat.subs && cat.subs.length > 0;
    const isExpanded = expandedCatId === cat.id;
    const isActive = cat.id === activeCatId;

    // 親タイル
    const tile = document.createElement('div');
    tile.className = 'tile' + (isActive && !hasSubs ? ' active-cat' : '') + (isExpanded ? ' active-cat' : '');
    tile.id = 'cat-' + cat.id;
    tile.innerHTML = iconHtml(cat) + cat.label + (hasSubs ? ' <span style="font-size:9px">▼</span>' : '');
    tile.onclick = () => {
      if(hasSubs){
        expandedCatId = isExpanded ? null : cat.id;
        renderCats();
      } else {
        expandedCatId = null;
        selectCat(cat.id);
      }
    };
    grid.appendChild(tile);

    // サブカテゴリパネル（展開時、3列グリッドの直後に全幅で挿入）
    if(hasSubs && isExpanded){
      const panel = document.createElement('div');
      panel.className = 'subcat-panel';
      const subGrid = document.createElement('div');
      subGrid.className = 'subcat-grid';
      cat.subs.forEach(sub => {
        const subTile = document.createElement('div');
        subTile.className = 'tile-sub' + (sub.id === activeCatId ? ' active-cat' : '');
        subTile.innerHTML = iconHtml(sub, 'icon-img') + sub.label;
        subTile.onclick = () => { selectCat(sub.id); renderCats(); };
        subGrid.appendChild(subTile);
      });
      panel.appendChild(subGrid);
      grid.appendChild(panel);
    }
  });

  // 未設定カスタム枠
  pendingCats.forEach(p => {
    const tile = document.createElement('div');
    tile.className = 'tile tile-new';
    tile.id = 'pending-' + p.id;
    tile.innerHTML = `<span class="icon">➕</span><span style="font-size:11px">${T.tapToSet}</span>`;
    tile.onclick = () => showEditPendingDialog(p.id);
    grid.appendChild(tile);
  });

  // カテゴリ追加ボタン
  const addTile = document.createElement('div');
  addTile.className = 'tile tile-add';
  addTile.innerHTML = `<span class="icon">＋</span>カテゴリ追加`;
  addTile.onclick = () => addPendingCat();
  grid.appendChild(addTile);
}

// ══════════════════════════════════════════════
//  カテゴリ選択 → 機材リスト描画
// ══════════════════════════════════════════════
function selectCat(catId) {
  activeCatId = catId;
  renderCats(); // ハイライト更新

  const cat   = getCat(catId);
  const items = getItems(catId);
  const isCustom = !!customCats.find(c => c.id === catId);

  document.getElementById('catTitle').textContent = cat ? cat.label : '';
  document.getElementById('itemCard').style.display = 'block';

  // カスタムカテゴリの場合のみ編集・削除ボタンを表示
  const actionsEl = document.getElementById('catActions');
  if (isCustom) {
    actionsEl.innerHTML = `
      <button class="btn-cat-edit" onclick="editCategory('${catId}')">✏️ 編集</button>
      <button class="btn-cat-del" onclick="deleteCategory('${catId}')">🗑 削除</button>
    `;
  } else {
    actionsEl.innerHTML = '';
  }

  const list = document.getElementById('itemList');
  list.innerHTML = '';

  // ① 機材を追加（全カテゴリに表示）
  const addRow = document.createElement('div');
  addRow.className = 'item item-add';
  addRow.innerHTML = `
    <div class="thumb">＋</div>
    <div class="item-name">${T.addItemRow}</div>
  `;
  addRow.onclick = () => showAddItemDialog(catId);
  list.appendChild(addRow);

  // ② 機材リスト（5件まで表示、残りは「もっと見る」）
  const LIMIT = VISIBLE_COUNT;
  const icon  = cat ? cat.icon : '📦';

  function renderItems(showAll) {
    // 追加行以外を削除
    list.querySelectorAll('.item:not(.item-add), .show-more').forEach(el => el.remove());

    const visible = showAll ? items : items.slice(0, LIMIT);
    visible.forEach(item => {
      const name = displayName(item);
      const maker = (typeof item === 'object' && item.maker) ? item.maker : '';
      const model = (typeof item === 'object') ? item.model : item;

      const row = document.createElement('div');
      row.className = 'item';
      const searchQuery = maker ? maker+' '+model : model;
      // 優先順位: 個別写真 > カテゴリ画像 > 絵文字
      const catImg = getCatImgByItemName(name);
      const thumbHtml = (typeof item==='object' && item.img)
        ? `<div class="thumb"><img class="thumb-img" src="${item.img}"></div>`
        : catImg
          ? `<div class="thumb"><img class="thumb-img" src="${catImg}" onerror="this.parentNode.innerHTML='${icon}'"></div>`
          : `<div class="thumb">${icon}</div>`;
      row.innerHTML = `
        ${thumbHtml}
        <div class="item-name">
          ${model}
          ${maker ? `<span class="item-sub">${maker}</span>` : ''}
        </div>
        <a class="item-amz" href="${amazonUrl(searchQuery)}" target="_blank" rel="noopener">
          <span>Amazon</span>
        </a>
        <button class="item-del" title="削除">🗑️</button>
      `;
      // 行タップ → ライトへ追加（Amazon・ゴミ箱以外）
      row.onclick = (e) => {
        if (e.target.closest('.item-del')) return;
        if (e.target.closest('.item-amz')) return;
        addItemToLight(name);
      };
      // ゴミ箱タップ → 削除確認
      row.querySelector('.item-del').onclick = (e) => {
        e.stopPropagation();
        deleteItem(catId, item, name, showAll, renderItems);
      };
      list.appendChild(row);
    });

    // 5件超の場合は「もっと見る」
    if (!showAll && items.length > LIMIT) {
      const more = document.createElement('div');
      more.className = 'show-more';
      more.textContent = T.showMore(items.length - LIMIT);
      more.onclick = () => renderItems(true);
      list.appendChild(more);
    }
  }

  renderItems(false);
}

// ══════════════════════════════════════════════
//  機材削除
// ══════════════════════════════════════════════
function deleteItem(catId, item, name, showAll, rerenderFn) {
  // confirm()の代わりに既存オーバーレイで確認
  document.getElementById('dlgTitle').textContent = T.deleteConfirm(name);
  document.getElementById('dlgBody').innerHTML = '';
  // OKボタンのラベルを「削除」に
  const okBtn = document.getElementById('dlgOk');
  const origOkText = okBtn.textContent;
  okBtn.textContent = '🗑️ ' + (T.ok || 'OK');
  okBtn.style.background = '#e53935';

  showOverlay(() => {
    // 削除実行
    if (DEFAULT_DB[catId]) {
      const idx = DEFAULT_DB[catId].indexOf(item);
      if (idx !== -1) DEFAULT_DB[catId].splice(idx, 1);
    } else {
      const cat = customCats.find(c => c.id === catId);
      if (cat) {
        const idx = cat.items.indexOf(item);
        if (idx !== -1) { cat.items.splice(idx, 1); saveCustomCats(); }
      }
    }
    // ボタンを元に戻す
    okBtn.textContent = origOkText;
    okBtn.style.background = '';
    rerenderFn(showAll);
    return true;
  });

  // closeOverlay時もボタンをリセット
  const origClose = closeOverlay;
  // キャンセル時にボタンリセット
  document.getElementById('dlgCancel').onclick = () => {
    okBtn.textContent = origOkText;
    okBtn.style.background = '';
    closeOverlay();
    // onclickを元に戻す
    document.getElementById('dlgCancel').onclick = closeOverlay;
  };
}

let _toastTimer=null;
function showToast(msg){
  let el=document.getElementById('toast');

    el=document.createElement('div');
    el.id='toast';
    el.className='toast';
    document.body.appendChild(el);

// ══════════════════════════════════════════════
//  機材の役割判定
// ══════════════════════════════════════════════
function getItemRole(name) {
  // DEFAULT_DBのどのカテゴリに属するか調べる
  for(const [catId, items] of Object.entries(DEFAULT_DB)){
    if(items.some(it => displayName(it) === name || (typeof it==='object' && it.model === name))){
      if(['stand','boom'].includes(catId))            return 'base';
      if(['strobe','video','video_stick'].includes(catId)) return 'light';
      if(['softbox','umbrella','beauty_dish','snoot','flag','reflector'].includes(catId)) return 'modifier';
    }
  }
  // カスタム機材はmodifierとして扱う
  return 'modifier';
}

function getItemImgSrc(name) {
  return findItemImg(name) || getCatImgByItemName(name) || null;
}

function makeImgTag(src, size, style='') {
  return `<img src="${src}" style="width:${size}px;height:${size}px;object-fit:contain;${style}">`;
}

// ══════════════════════════════════════════════
//  ライトカード描画
// ══════════════════════════════════════════════
function isStrobe(items){ return items.some(n=>/AD\d|strobe/i.test(n)); }
const STROBE_STEPS=['1/256','1/128','1/64','1/32','1/16','1/8','1/4','1/2','1/1'];
function strobeLabel(v){ return STROBE_STEPS[Math.round(v)]||'1/1'; }
function outputLabel(l){
  if(!l.items||l.items.length===0) return '';
  const v=l.output!=null?l.output:null;
  if(isStrobe(l.items)) return v!==null?strobeLabel(v):'1/1';
  return (v!==null?Math.round(v):100)+'%';
}

// ══════════════════════════════════════════════
function renderLights() {
  const row = document.getElementById('lightRow');
  row.innerHTML = '';
  lights.forEach((l, i) => {
    const card = document.createElement('div');
    card.className = 'lightCard' + (i === currentLight ? ' active' : '');

    // 機材を役割別に仕分け
    const bases     = l.items.filter(n => getItemRole(n) === 'base');
    const lights_   = l.items.filter(n => getItemRole(n) === 'light');
    const modifiers = l.items.filter(n => getItemRole(n) === 'modifier');

    const previewHTML = (() => {
      if (!l.items.length) return '<span style="color:#ccc;font-size:13px;align-self:center">' + T.empty + '</span>';

      const hasBase  = bases.length > 0;
      const hasLight = lights_.length > 0;
      const hasMod   = modifiers.length > 0;
      const hasBoom  = l.items.some(n=>getItemRole(n)==='base' && (n.includes('Boom')||n.includes('boom')||n==='Boom Arm'||n==='Mini Boom'));

      const baseImgSrc = hasBoom ? 'icons/boom_stand.png' : (hasBase ? getItemImgSrc(bases[0]) : null);
      const baseW = hasBoom ? 90 : 71;
      const baseH = hasBoom ? 113 : 113;

      let html;

      if(hasBoom){
        const tipX = Math.round(baseW * 0.45);
        const tipY = Math.round(baseH * 0.28);
        const lightW = 21, lightH = 21, modW = 36, modH = 36;
        html = `<div style="position:relative;width:${baseW + modW + 4}px;height:${baseH}px;flex-shrink:0">`;
        html += `<img src="${baseImgSrc}" style="position:absolute;left:0;top:0;width:${baseW}px;height:${baseH}px;object-fit:contain;">`;
        if(hasLight){
          const src = getItemImgSrc(lights_[0]);
          const lx = tipX - lightW/2;
          const ly = tipY - lightH + 7;
          html += src
            ? `<img src="${src}" style="position:absolute;left:${lx}px;top:${ly}px;width:${lightW}px;height:${lightH}px;object-fit:contain;">`
            : `<span style="position:absolute;left:${lx}px;top:${ly}px;font-size:12px">⚡</span>`;
        }
        if(hasMod){
          modifiers.forEach((name,idx)=>{
            const src = getItemImgSrc(name);
            const mx = tipX + lightW/2 - 7 + idx*(modW-10);
            const my = tipY - modH/2 - lightH/2 + 2;
            html += src
              ? `<img src="${src}" style="position:absolute;left:${mx}px;top:${my}px;width:${modW}px;height:${modH}px;object-fit:contain;">`
              : `<span style="position:absolute;left:${mx}px;top:${my}px;font-size:18px">⬡</span>`;
          });
        }
        html += '</div>';
      } else {
        html = '<div style="display:flex;align-items:flex-end;justify-content:center;gap:1px;width:100%">';
        if (hasLight || hasBase) {
          html += '<div style="display:flex;flex-direction:column;align-items:center;gap:0">';
          if (hasLight) {
            const src = getItemImgSrc(lights_[0]);
            html += src
              ? `<img src="${src}" style="width:21px;height:21px;object-fit:contain;margin-bottom:-21px;">`
              : `<span style="font-size:14px;line-height:1">${guessIcon(lights_[0])}</span>`;
          }
          if (baseImgSrc) {
            html += `<img src="${baseImgSrc}" style="width:${baseW}px;height:${baseH}px;object-fit:contain;">`;
          } else if (hasBase) {
            html += `<span style="font-size:42px;line-height:1">${guessIcon(bases[0])}</span>`;
          }
          html += '</div>';
        }
        if (hasMod) {
          modifiers.forEach((name, idx) => {
            const src = getItemImgSrc(name);
            const mb = hasBase ? 90 : 0;
            const ml = idx === 0 ? -30 : -18;
            html += `<div style="margin-bottom:${mb}px;margin-left:${ml}px;">`;
            html += src
              ? `<img src="${src}" style="width:36px;height:36px;object-fit:contain;">`
              : `<span style="font-size:18px">${guessIcon(name)}</span>`;
            html += '</div>';
          });
        }
        if (!hasLight && !hasBase && hasMod) {
          html = '<div style="display:flex;align-items:center;justify-content:center;gap:3px;width:100%">';
          modifiers.forEach(name => {
            const src = getItemImgSrc(name);
            html += src
              ? `<img src="${src}" style="width:38px;height:38px;object-fit:contain;">`
              : `<span style="font-size:20px">${guessIcon(name)}</span>`;
          });
        }
        html += '</div>';
      }
      return html;
    })();

    const strobe=isStrobe(l.items);
    const outVal=l.output!=null?l.output:(strobe?8:100);
    const outDisp=outputLabel(l);

    card.innerHTML = `
      <div class="lc-header">
        <span class="lc-label">${['A','B','C','D','E'][i]}</span>
        <button class="btn-clear" onclick="clearLight(${i});event.stopPropagation()">×</button>
      </div>
      <div class="preview">${previewHTML}</div>
      <div>${l.items.map(v => `<span class="tag">${v}</span>`).join('')}</div>
    `;
    card.onclick = () => { currentLight = i; renderLights(); };
    row.appendChild(card);
  });
}

function clearLight(i) { lights[i].items = []; renderLights(); }

function updateOutput(i, val) {
  lights[i].output = Number(val);
  const disp = document.getElementById('outDisp_'+i);
  if (disp) disp.textContent = isStrobe(lights[i].items) ? strobeLabel(val) : Math.round(val)+'%';
}

// ══════════════════════════════════════════════
//  オーバーレイ共通制御
//  onOk: ()=>boolean  true=閉じる / false=閉じない
// ══════════════════════════════════════════════
function showOverlay(onOk) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('dlgOk').onclick = () => { if (onOk()) closeOverlay(); };
}
function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ══════════════════════════════════════════════
//  保存
// ══════════════════════════════════════════════
function saveAndExit() {
  try {
    localStorage.setItem('lightingRecipeLights', JSON.stringify(lights));
  } catch(e) { console.warn('localStorage error:', e); }
  // Safari対応：setItem後に少し待ってから遷移
  setTimeout(() => { window.location.href = 'index.html'; }, 100);
}

function applyI18n(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  s('warehouseTitle', T.warehouseTitle);
  s('catTitle',       T.catPrompt);
  s('builderTitle',   T.builderTitle);
  s('saveBtn',        T.saveBtn);
}

applyI18n();
loadDefaultAdditions();
// IDB画像を復元してからレンダリング
loadAllItemImgs().then(imgs=>{
  // customCatsとDEFAULT_DBの機材に画像を復元
  Object.entries(imgs).forEach(([key,dataUrl])=>{
    // catId_maker_model の形式で検索
    const parts=key.split('_');
    const catId=parts[0];
    const items=DEFAULT_DB[catId]||(customCats.find(c=>c.id===catId)||{}).items;
    if(!items)return;
    items.forEach(it=>{
      if(typeof it==='object'){
        const k=catId+'_'+(it.maker?it.maker+'_':'')+it.model;
        if(k===key) it.img=dataUrl;
      }
    });
  });
  renderCats();
  renderLights();
});
