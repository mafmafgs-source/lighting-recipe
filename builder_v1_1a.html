<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>builder_v1_1a</title>
<style>
body{font-family:Arial;background:#f3f3f3;margin:0;padding:10px}
.wrap{max-width:430px;margin:auto}
.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tile{border:1px solid #ddd;border-radius:10px;padding:10px;text-align:center;background:#fafafa;cursor:pointer}
.item{display:flex;gap:8px;padding:8px;border-bottom:1px solid #eee;cursor:pointer}
.thumb{width:40px;height:40px;background:#ddd;border-radius:8px;display:flex;align-items:center;justify-content:center}
.lightRow{display:flex;gap:10px;overflow-x:auto}
.lightCard{min-width:120px;height:260px;border:2px solid #ccc;border-radius:12px;padding:8px;background:#fafafa}
.active{border:4px solid #ff9800;background:#fff8e8}
.preview{text-align:center;font-size:22px;line-height:1.1;min-height:90px}
.tag{display:block;font-size:11px}
.top{display:flex;justify-content:space-between}
.x{background:#d33;color:#fff;border:none;border-radius:50%;width:24px;height:24px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:#0b57d0;color:#fff}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h3>機材倉庫</h3>
<div class="grid">
<div class="tile" onclick="showCat('strobe')">⚡<br>ストロボ</div>
<div class="tile" onclick="showCat('video')">💡<br>ビデオ</div>
<div class="tile" onclick="showCat('modifier')">⬡<br>モディ</div>
<div class="tile" onclick="showCat('stand')">△<br>スタンド</div>
<div class="tile" onclick="showCat('boom')">┐<br>ブーム</div>
<div class="tile" onclick="showCat('reflector')">◻<br>レフ板</div>
<div class="tile" onclick="showCat('other')">📦<br>その他</div>
<div class="tile">➕<br>新規追加</div>
<div class="tile">⚙️<br>管理</div>
</div>
</div>

<div class="card">
<h3 id="catTitle">カテゴリ選択</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>Light Builder</h3>
<div class="lightRow" id="lights"></div>
</div>

<div class="card">
<button class="btn" onclick="saveAndExit()">保存して戻る</button>
</div>

</div>

<script>
const db={
strobe:['AD100Pro','AD200Pro','AD300Pro','AD400Pro','AD600Pro'],
video:['Forza300','Aputure300D'],
modifier:['120cm Octa','90cm Octa','Beauty Dish','Umbrella','Snoot'],
stand:['1052BAC','Nano Stand'],
boom:['Boom Arm'],
reflector:['白レフ','黒レフ','トランスルーセント'],
other:['その他']
};

let current=0;
let lights=JSON.parse(localStorage.getItem('lightingRecipeLights')||'[{"items":[]},{"items":[]},{"items":[]},{"items":[]},{"items":[]}]');

function drawLights(){
 const wrap=document.getElementById('lights');
 wrap.innerHTML='';
 lights.forEach((l,i)=>{
  let c=document.createElement('div');
  c.className='lightCard'+(i===current?' active':'');

  const hasAD=l.items.some(x=>x.includes('AD'));
  const hasMod=l.items.some(x=>['Octa','Dish','Umbrella','Snoot'].some(y=>x.includes(y)));
  const hasStand=l.items.some(x=>x.includes('BAC')||x.includes('Stand'));
  const hasVideo=l.items.some(x=>x.includes('Forza')||x.includes('Aputure'));

  c.innerHTML=`
  <div class="top">
   <b>L${i+1}</b>
   <button class="x" onclick="clearLight(${i});event.stopPropagation()">×</button>
  </div>
  <div class="preview">
  ${hasMod?'⬡<br>':''}
  ${hasAD?'⚡<br>':''}
  ${hasVideo?'💡<br>':''}
  ${hasStand?'│<br>△':''}
  </div>
  <div>${l.items.map(v=>'<span class="tag">'+v+'</span>').join('')}</div>`;

  c.onclick=()=>{current=i;drawLights();};
  wrap.appendChild(c);
 });
}

function clearLight(i){lights[i].items=[];drawLights();}

function showCat(cat){
 catTitle.textContent=cat;
 list.innerHTML='';
 db[cat].forEach(name=>{
  let d=document.createElement('div');
  d.className='item';
  d.innerHTML='<div class="thumb">📷</div><div>'+name+'</div>';
  d.onclick=()=>{
   lights[current].items.push(name);
   drawLights();
  };
  list.appendChild(d);
 });
}

function saveAndExit(){
 localStorage.setItem('lightingRecipeLights',JSON.stringify(lights));
 window.location.href='index.html';
}

drawLights();
</script>
</body>
</html>
