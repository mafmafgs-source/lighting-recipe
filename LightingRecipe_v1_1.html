<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lighting Recipe v1.1</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;padding:10px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px}
.top{display:flex;gap:10px}
.photo{flex:2}
.photo img{width:100%;max-height:260px;object-fit:cover;border-radius:10px}
.side{flex:1}
.exif{display:flex;justify-content:space-around;font-size:12px;margin-top:8px;flex-wrap:wrap}
#room{height:360px;border:1px solid #ccc;border-radius:10px;position:relative;background:#fafafa}
.node{position:absolute;width:50px;height:50px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none}
.rack{display:flex;gap:8px;overflow:auto;margin-top:8px}
.tool{padding:8px;border:1px solid #aaa;border-radius:8px;background:white}
button{padding:8px}
</style>
</head>
<body>
<div class="card">
<input type="file" id="photoInput"><br><br>
<div class="top">
<div class="photo"><img id="preview"></div>
<div class="side">
<b>📍ロケーション</b><br><input id="location" value="非公開"><br>
<b>📝メモ</b><br><textarea id="memo">撮影メモ</textarea>
</div>
</div>
<div class="exif">
<span>α7IV</span><span>85mm</span><span>F1.8</span><span>1/160</span><span>ISO100</span>
</div>
</div>

<div class="card">
<h3>ライティング図</h3>
<div id="room"></div>
<div class="rack">
<button class="tool" onclick="addNode('⚡')">⚡</button>
<button class="tool" onclick="addNode('💡')">💡</button>
</div>
<br><button onclick="saveRecipe()">保存</button>
<button onclick="loadRecipe()">読込</button>
</div>

<script>
const room=document.getElementById('room');

photoInput.onchange=e=>{
 const f=e.target.files[0];
 if(!f) return;
 const r=new FileReader();
 r.onload=()=>{
   preview.src=r.result;
   localStorage.setItem('lr_photo',r.result);
 };
 r.readAsDataURL(f);
};

function colorFromHeight(h){
 if(h<=160){
  let t=(h-50)/110;
  return `rgb(${255*t},${255*t},255)`;
 }
 let t=(h-160)/140;
 return `rgb(255,${255*(1-t)},${255*(1-t)})`;
}

function addNode(icon){
 const d=document.createElement('div');
 d.className='node';
 d.textContent=icon;
 d.dataset.height=160;
 d.style.background=colorFromHeight(160);
 d.style.left='20px';
 d.style.top='20px';
 room.appendChild(d);

 let sx,sy,ox,oy;
 d.onpointerdown=(e)=>{
  sx=e.clientX; sy=e.clientY;
  ox=parseInt(d.style.left); oy=parseInt(d.style.top);
  const move=(ev)=>{
   d.style.left=(ox+ev.clientX-sx)+'px';
   d.style.top=(oy+ev.clientY-sy)+'px';
  };
  const up=()=>{
   document.removeEventListener('pointermove',move);
   document.removeEventListener('pointerup',up);
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
 };

 d.onclick=()=>{
   let h=prompt("高さ(cm)", d.dataset.height);
   if(!h) return;
   d.dataset.height=h;
   d.style.background=colorFromHeight(Number(h));
 };
}

function saveRecipe(){
 const nodes=[...document.querySelectorAll('.node')].map(n=>({
   icon:n.textContent,left:n.style.left,top:n.style.top,height:n.dataset.height
 }));
 localStorage.setItem('lr_nodes',JSON.stringify(nodes));
 localStorage.setItem('lr_location',location.value);
 localStorage.setItem('lr_memo',memo.value);
 alert('保存しました');
}

function loadRecipe(){
 preview.src=localStorage.getItem('lr_photo')||'';
 location.value=localStorage.getItem('lr_location')||'';
 memo.value=localStorage.getItem('lr_memo')||'';
 room.innerHTML='';
 const nodes=JSON.parse(localStorage.getItem('lr_nodes')||'[]');
 nodes.forEach(x=>{
   const d=document.createElement('div');
   d.className='node';
   d.textContent=x.icon;
   d.dataset.height=x.height;
   d.style.left=x.left;
   d.style.top=x.top;
   d.style.background=colorFromHeight(Number(x.height));
   room.appendChild(d);
 });
}
loadRecipe();
</script>
</body>
</html>
